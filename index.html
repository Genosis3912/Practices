<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Futuristic HUD</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://threejs.org/examples/js/loaders/FontLoader.js"></script>
<script src="https://threejs.org/examples/js/geometries/TextGeometry.js"></script>

<script>
let scene, camera, renderer;
let particles, ring1, ring2, core, textMesh;
let mouse = { x: 0, y: 0 };
let clock = new THREE.Clock();

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 10;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // LIGHTS
  const light = new THREE.PointLight(0x00ffff, 2);
  light.position.set(5,5,5);
  scene.add(light);

  // CORE (energy sphere)
  core = new THREE.Mesh(
    new THREE.SphereGeometry(1, 32, 32),
    new THREE.MeshStandardMaterial({
      color: 0x00ffff,
      emissive: 0x003333
    })
  );
  scene.add(core);

  // HUD RINGS
  ring1 = new THREE.Mesh(
    new THREE.TorusGeometry(2.5, 0.05, 16, 100),
    new THREE.MeshBasicMaterial({ color: 0x00ffff })
  );

  ring2 = new THREE.Mesh(
    new THREE.TorusGeometry(3.5, 0.05, 16, 100),
    new THREE.MeshBasicMaterial({ color: 0x00ff99 })
  );

  ring2.rotation.x = Math.PI / 2;

  scene.add(ring1);
  scene.add(ring2);

  // PARTICLES
  const count = 6000;
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);

  for (let i = 0; i < count * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 20;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({
    color: 0x00ffff,
    size: 0.02
  });

  particles = new THREE.Points(geometry, material);
  scene.add(particles);

  // TEXT
  const loader = new THREE.FontLoader();
  loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font) {
    const textGeometry = new THREE.TextGeometry("ANKUR KHADKA", {
      font: font,
      size: 0.6,
      height: 0.2,
    });

    const textMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff });

    textMesh = new THREE.Mesh(textGeometry, textMaterial);
    textMesh.position.set(-3, -4, 0);
    scene.add(textMesh);
  });

  // MOUSE
  window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  window.addEventListener('resize', onResize);
}

function animate() {
  requestAnimationFrame(animate);

  let elapsed = clock.getElapsedTime();

  // CORE PULSE
  let scale = 1 + Math.sin(elapsed * 3) * 0.1;
  core.scale.set(scale, scale, scale);

  // ROTATIONS
  ring1.rotation.z += 0.01;
  ring2.rotation.y += 0.008;
  particles.rotation.y += 0.0005;

  // CAMERA PARALLAX
  camera.position.x += (mouse.x * 3 - camera.position.x) * 0.05;
  camera.position.y += (mouse.y * 3 - camera.position.y) * 0.05;
  camera.lookAt(scene.position);

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
