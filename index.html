<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced HUD Upgrade</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>
<a href="background.html"></a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://threejs.org/examples/js/loaders/FontLoader.js"></script>
<script src="https://threejs.org/examples/js/geometries/TextGeometry.js"></script>

<script>
let scene, camera, renderer;
let particles, core, textMesh;
let rings = [];
let particleRing;
let mouse = { x: 0, y: 0 };
let clock = new THREE.Clock();

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 12;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.PointLight(0xffffff, 2);
  light.position.set(5,5,5);
  scene.add(light);

  core = new THREE.Mesh(
    new THREE.SphereGeometry(1, 32, 32),
    new THREE.MeshStandardMaterial({
      color: 0x00ffff,
      emissive: 0x003333
    })
  );
  scene.add(core);

 
  const ringColors = [
    0x00ffff, 
    0x00ff99,
    0xff9900, 
    0xffff00, 
    0xff3300,
    0xffcc00, 
    0xffffff  
  ];

  for (let i = 0; i < 7; i++) {
    let ring = new THREE.Mesh(
      new THREE.TorusGeometry(2 + i * 0.5, 0.05, 16, 100),
      new THREE.MeshBasicMaterial({ color: ringColors[i] })
    );

    ring.rotation.x = Math.random() * Math.PI;
    ring.rotation.y = Math.random() * Math.PI;

    rings.push(ring);
    scene.add(ring);
  }

  const count = 5000;
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);

  for (let i = 0; i < count * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 20;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({
    color: 0x00ffff,
    size: 0.02
  });

  particles = new THREE.Points(geometry, material);
  scene.add(particles);

  const ringCount = 2000;
  const ringGeo = new THREE.BufferGeometry();
  const ringPos = new Float32Array(ringCount * 3);

  for (let i = 0; i < ringCount; i++) {
    let i3 = i * 3;
    let angle = (i / ringCount) * Math.PI * 2;
    let radius = 4;

    ringPos[i3] = Math.cos(angle) * radius;
    ringPos[i3+1] = Math.sin(angle) * radius;
    ringPos[i3+2] = 0;
  }

  ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));

  const ringMat = new THREE.PointsMaterial({
    color: 0xffaa00,
    size: 0.04
  });

  particleRing = new THREE.Points(ringGeo, ringMat);
  scene.add(particleRing);

  // TEXT
  const loader = new THREE.FontLoader();
  loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font) {
    const textGeometry = new THREE.TextGeometry("ANKUR KHADKA", {
      font: font,
      size: 0.6,
      height: 0.2,
    });

    const textMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

    textMesh = new THREE.Mesh(textGeometry, textMaterial);
    textMesh.position.set(-4, -5, 0);
    scene.add(textMesh);
  });

  window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
    mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  window.addEventListener('resize', onResize);
}

function animate() {
  requestAnimationFrame(animate);

  let t = clock.getElapsedTime();

  let scale = 1 + Math.sin(t * 3) * 0.1;
  core.scale.set(scale, scale, scale);

  rings.forEach((ring, i) => {
    ring.rotation.x += 0.005 + i * 0.001;
    ring.rotation.y += 0.005 + i * 0.001;
  });

  particles.rotation.y += 0.0005;

  particleRing.rotation.z += 0.01;
  particleRing.rotation.x = Math.sin(t) * 0.5;

  camera.position.x += (mouse.x * 4 - camera.position.x) * 0.05;
  camera.position.y += (mouse.y * 4 - camera.position.y) * 0.05;
  camera.lookAt(scene.position);

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
