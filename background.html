<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Animated Background</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: black;
      color: white;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="section">
  <div class="glass">
    <h1>3D Background</h1>
  </div>
</div>

<div class="section">
  <div class="glass">
    <h1>Scroll Down</h1>
  </div>
</div>

<div class="section">
  <div class="glass">
    <h1>Animated Effects</h1>
  </div>
</div>

<!-- ✅ Three.js (NON-MODULE SAFE VERSION) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.136/build/three.min.js"></script>

<!-- ✅ GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
  // Scene
  const scene = new THREE.Scene();

  // Camera
  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  // Renderer
  const renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("bg"),
    antialias: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);

  // Geometry
  const geometry = new THREE.IcosahedronGeometry(2, 10);

  // Material
  const material = new THREE.MeshStandardMaterial({
    color: 0x00ffff,
    wireframe: true
  });

  // Mesh
  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  // Light
  const light = new THREE.PointLight(0xffffff, 2);
  light.position.set(5, 5, 5);
  scene.add(light);

  camera.position.z = 5;

  // Animate
  function animate() {
    requestAnimationFrame(animate);

    mesh.rotation.x += 0.003;
    mesh.rotation.y += 0.005;

    renderer.render(scene, camera);
  }
  animate();

  // Resize
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // GSAP Scroll Animation
  gsap.registerPlugin(ScrollTrigger);

  gsap.to(mesh.rotation, {
    x: Math.PI,
    y: Math.PI,
    scrollTrigger: {
      trigger: document.body,
      start: "top top",
      end: "bottom bottom",
      scrub: true
    }
  });
</script>

</body>
</html>
