<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Simple Surprise Button</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #f5f7fc 0%, #e9eef5 100%);
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.1s ease;
    }

    /* Simple, friendly card */
    .card {
      text-align: center;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(2px);
      border-radius: 64px;
      padding: 3rem 4rem;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(0, 0, 0, 0.02);
      transition: transform 0.2s;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      color: #1e2a3a;
      margin-bottom: 0.5rem;
    }

    .sub {
      font-size: 1rem;
      color: #4a627a;
      margin-bottom: 2rem;
      border-top: 1px solid #cbd5e1;
      display: inline-block;
      padding-top: 0.5rem;
    }

    /* The big, friendly button */
    .surprise-btn {
      background: #2c3e66;
      border: none;
      color: white;
      font-size: 1.8rem;
      font-weight: 600;
      padding: 16px 42px;
      border-radius: 60px;
      cursor: pointer;
      font-family: inherit;
      transition: 0.2s;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
      letter-spacing: 1px;
    }

    .surprise-btn:hover {
      background: #1e2f4b;
      transform: scale(1.02);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.15);
    }

    .surprise-btn:active {
      transform: scale(0.98);
    }

    .info-note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #7c8ea0;
      background: #f0f2f5;
      display: inline-block;
      padding: 6px 18px;
      border-radius: 60px;
    }

    /* Jumpscare overlay (hidden initially) */
    .jumpscare-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s linear 0.05s, opacity 0.08s linear;
    }

    /* Scary image styling */
    .scary-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      animation: shake 0.08s infinite;
      filter: brightness(1.05) contrast(1.2);
    }

    /* Quick shake effect */
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0.5deg); }
      10% { transform: translate(-1px, -2px) rotate(-0.5deg); }
      20% { transform: translate(-2px, 0px) rotate(0.6deg); }
      30% { transform: translate(2px, 1px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(0.4deg); }
      50% { transform: translate(-1px, 2px) rotate(-0.3deg); }
      60% { transform: translate(-2px, 1px) rotate(0.2deg); }
      70% { transform: translate(2px, 1px) rotate(-0.4deg); }
      80% { transform: translate(-1px, -1px) rotate(0.3deg); }
      90% { transform: translate(1px, 2px) rotate(-0.2deg); }
      100% { transform: translate(1px, -2px) rotate(0.1deg); }
    }

    /* Red flash */
    .red-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(220, 40, 40, 0.85);
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.02s linear;
    }

    /* Disable button during scare */
    .disable-click {
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="card" id="mainCard">
  <h1>😊 Welcome! 😊</h1>
  <div class="sub">Nothing scary here — just a button</div>
  <button class="surprise-btn" id="scareButton">🔘 Click me! 🔘</button>
  <div class="info-note">✨ go ahead, it's safe... or is it? ✨</div>
</div>

<!-- Jumpscare elements -->
<div class="jumpscare-overlay" id="jumpscareOverlay">
  <img id="scaryImage" class="scary-img" alt="surprise" style="display: block;">
</div>
<div class="red-flash" id="redFlash"></div>

<script>
  (function() {
    // ------------------------------------------------------------------
    // 🔽🔽🔽 PASTE YOUR DIRECT IMAGE LINKS BELOW 🔽🔽🔽
    // Replace these with your own working image URLs.
    // The page will pick one at random when the button is clicked.
    // ------------------------------------------------------------------
    const IMAGE_URLS = [
      "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9k2VicGa0PDe-3zGdPRxjr4evBtr8cyDYvQ&s",   // your first link
      "https://play-lh.googleusercontent.com/e7DJKGt5XWSfmusAX1FBtd2Xa3ggAPonVsGukbdH6rVab26fSg40Zmz9xVykKVTlCQ=w240-h480-rw",
      "https://t3.ftcdn.net/jpg/02/99/15/96/360_F_299159695_Dx86xbMqPbcTx5fHL3xwKDGeUJN7IDZM.jpg",
      "https://img.freepik.com/premium-photo/portrait-asian-woman-make-up-ghost-facehorror-scenescary-backgroundhalloween-poster_44277-9211.jpg"
    ];
    
    // If some links don't work, a fallback image (a funny but startling face) will be used.
    const FALLBACK_IMAGE = "https://media1.tenor.com/m/-waV2kzt2U0AAAAC/scary-face.gif";
    // ------------------------------------------------------------------
    // ⬆️⬆️⬆️ NO NEED TO EDIT BELOW THIS LINE ⬆️⬆️⬆️
    // ------------------------------------------------------------------

    // DOM elements
    const scareBtn = document.getElementById('scareButton');
    const jumpscareDiv = document.getElementById('jumpscareOverlay');
    const redFlashDiv = document.getElementById('redFlash');
    const scaryImg = document.getElementById('scaryImage');
    const mainCardDiv = document.getElementById('mainCard');

    // Audio setup: quick startling "beep scare" sound using Web Audio (works without external files)
    let audioCtx = null;
    let startleBuffer = null;
    let audioAllowed = false;

    // Create a short, jarring buzz/scream sound
    function createStartleSound() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      const sampleRate = audioCtx.sampleRate;
      const duration = 0.7;
      const bufferSize = sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
      const channel = buffer.getChannelData(0);
      
      for (let i = 0; i < bufferSize; i++) {
        const t = i / sampleRate;
        // harsh rising tone
        let freq = 300 + t * 1100;
        if (freq > 1500) freq = 1500;
        let tone = Math.sin(2 * Math.PI * freq * t) * (1 - t/duration);
        let noise = (Math.random() - 0.5) * 0.7;
        let envelope = Math.min(1.0, t * 20) * (1 - t/duration);
        let sample = (tone * 0.9 + noise * 0.5) * envelope;
        sample = Math.max(-0.9, Math.min(0.9, sample * 1.2));
        channel[i] = sample;
      }
      return buffer;
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (!startleBuffer) {
        startleBuffer = createStartleSound();
      }
    }

    function playStartleSound() {
      if (!audioAllowed) return;
      if (!audioCtx || !startleBuffer) {
        initAudio();
        if (!startleBuffer) return;
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => playNow()).catch(e => console.warn);
      } else {
        playNow();
      }
    }
    
    function playNow() {
      if (!audioCtx || !startleBuffer) return;
      try {
        const source = audioCtx.createBufferSource();
        source.buffer = startleBuffer;
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.85;
        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        source.start();
      } catch(e) { console.warn(e); }
    }

    // Enable audio on first user interaction (click anywhere)
    function enableAudio() {
      if (audioAllowed) return;
      initAudio();
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => { audioAllowed = true; }).catch(() => {});
      } else {
        audioAllowed = true;
      }
    }
    
    window.addEventListener('click', function firstClick() {
      enableAudio();
      window.removeEventListener('click', firstClick);
    }, { once: true });
    window.addEventListener('touchstart', function firstTouch() {
      enableAudio();
      window.removeEventListener('touchstart', firstTouch);
    }, { once: true });

    // Preload images (so they appear instantly)
    function preloadAllImages() {
      IMAGE_URLS.forEach(url => {
        const img = new Image();
        img.src = url;
      });
      const fallbackImg = new Image();
      fallbackImg.src = FALLBACK_IMAGE;
    }
    preloadAllImages();

    // State: avoid multiple scares at once
    let isScaring = false;
    let timeoutIds = [];

    function clearTimeouts() {
      for (let id of timeoutIds) clearTimeout(id);
      timeoutIds = [];
    }

    // Get a random image from the list, fallback if image fails to load
    function getRandomImageUrl() {
      if (!IMAGE_URLS.length) return FALLBACK_IMAGE;
      const randomIndex = Math.floor(Math.random() * IMAGE_URLS.length);
      return IMAGE_URLS[randomIndex];
    }

    // Jump scare routine
    function triggerSurprise() {
      if (isScaring) return;
      isScaring = true;
      clearTimeouts();

      // Enable and play sound
      if (!audioAllowed) {
        enableAudio();
        setTimeout(() => playStartleSound(), 10);
      } else {
        playStartleSound();
      }

      // Red flash (quick)
      redFlashDiv.style.opacity = '0.9';
      setTimeout(() => { redFlashDiv.style.opacity = '0'; }, 70);

      // Tiny delay for more impact
      setTimeout(() => {
        // Select a random scary image
        const imgUrl = getRandomImageUrl();
        scaryImg.src = imgUrl;
        
        // If image fails to load, use fallback
        scaryImg.onerror = () => {
          if (scaryImg.src !== FALLBACK_IMAGE) {
            scaryImg.src = FALLBACK_IMAGE;
          }
        };
        
        // Show overlay
        jumpscareDiv.style.visibility = 'visible';
        jumpscareDiv.style.opacity = '1';
        scaryImg.style.animation = 'shake 0.08s infinite';
        
        // Second red flash
        redFlashDiv.style.opacity = '0.95';
        setTimeout(() => { redFlashDiv.style.opacity = '0'; }, 130);
        
        // Optional: vibrate for mobile (tiny buzz)
        if (navigator.vibrate) navigator.vibrate(100);
        
        // Disable button during scare
        mainCardDiv.classList.add('disable-click');
        scareBtn.disabled = true;
        document.body.style.overflow = 'hidden';
        
        // Hide jumpscare after 1 second
        timeoutIds.push(setTimeout(() => {
          jumpscareDiv.style.transition = 'opacity 0.15s ease-out, visibility 0s linear 0.2s';
          jumpscareDiv.style.opacity = '0';
          setTimeout(() => {
            jumpscareDiv.style.visibility = 'hidden';
            jumpscareDiv.style.transition = '';
            scaryImg.style.animation = '';
            // re-enable button
            mainCardDiv.classList.remove('disable-click');
            scareBtn.disabled = false;
            document.body.style.overflow = '';
            isScaring = false;
            
            // change button text for a moment (playful)
            const originalText = scareBtn.innerHTML;
            scareBtn.innerHTML = "😱 Gotcha! 😱";
            setTimeout(() => {
              if (scareBtn && !isScaring) scareBtn.innerHTML = originalText;
            }, 1000);
          }, 180);
        }, 1000));
      }, 50);
    }

    // Attach button event
    scareBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (isScaring) return;
      triggerSurprise();
    });

    // Clean timeouts on page unload
    window.addEventListener('beforeunload', () => {
      clearTimeouts();
    });
    
    // Small console info
    console.log("Simple surprise page ready. Click the button for a jumpscare using your images!");
  })();
</script>
</body>
</html>
