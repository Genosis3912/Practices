<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>THE SUMMONING | Horror Jump Scare</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* Prevents text selection, adds to the uneasy feel */
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at center, #0a0c12 0%, #010101 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'Creepster', monospace;
      overflow: hidden;
      cursor: crosshair;
    }

    /* Main container: simple, clean horror stage */
    .horror-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* CENTRAL BUTTON — simple and ominous */
    .dread-button {
      background: #140606;
      border: 3px solid #a12222;
      color: #f0d5b0;
      font-size: 2.2rem;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      padding: 18px 42px;
      border-radius: 80px;
      cursor: pointer;
      transition: 0.2s;
      text-transform: uppercase;
      letter-spacing: 8px;
      box-shadow: 0 0 25px #5e1a1a, inset 0 0 8px rgba(255, 50, 50, 0.3);
      z-index: 20;
      backdrop-filter: blur(4px);
      background-color: #1c0808cc;
    }

    .dread-button:hover {
      transform: scale(1.02);
      background: #2c0f0f;
      border-color: #e34d4d;
      box-shadow: 0 0 45px #ff2a2a;
      color: white;
      letter-spacing: 10px;
    }

    .dread-button:active {
      transform: scale(0.98);
    }

    /* simple eerie subtitle */
    .whisper {
      margin-top: 35px;
      color: #7a5a5a;
      font-size: 0.85rem;
      background: #00000066;
      padding: 6px 16px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      letter-spacing: 1px;
    }

    /* JUMPSARE OVERLAY (for image or video) */
    .jumpscare-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s linear 0.05s, opacity 0.08s linear;
      backdrop-filter: brightness(0.3);
    }

    /* Media (image or video) styling — fills screen while keeping proportions */
    .scary-media {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      animation: violentShake 0.12s infinite;
      filter: contrast(1.3) brightness(0.95) drop-shadow(0 0 30px crimson);
      image-rendering: crisp-edges;
    }

    /* intense shake for extra terror */
    @keyframes violentShake {
      0% { transform: translate(1px, 1px) rotate(0.3deg); }
      10% { transform: translate(-1px, -2px) rotate(-0.5deg); }
      20% { transform: translate(-2px, 0px) rotate(0.6deg); }
      30% { transform: translate(2px, 1px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(0.4deg); }
      50% { transform: translate(-1px, 2px) rotate(-0.3deg); }
      60% { transform: translate(-2px, 1px) rotate(0.2deg); }
      70% { transform: translate(2px, 1px) rotate(-0.4deg); }
      80% { transform: translate(-1px, -1px) rotate(0.3deg); }
      90% { transform: translate(1px, 2px) rotate(-0.2deg); }
      100% { transform: translate(1px, -2px) rotate(0.1deg); }
    }

    /* RED FLASH for instant shock */
    .red-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(200, 0, 0, 0.85);
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.02s linear;
    }

    /* subtle background note */
    .creepy-footer {
      position: fixed;
      bottom: 12px;
      left: 12px;
      color: #4e2e2e;
      font-size: 9px;
      background: #00000066;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: monospace;
      z-index: 10;
      pointer-events: none;
    }

    /* Disable clicks while jumpscare active */
    .disable-interaction {
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="horror-stage" id="horrorStage">
  <button class="dread-button" id="summonButton">⚡ SUMMON ⚡</button>
  <div class="whisper">❄️ click only if you are ready to see it ❄️</div>
</div>

<!-- Jumpscare overlay (will display either image or video) -->
<div class="jumpscare-container" id="jumpscareOverlay">
  <!-- Media element: we will dynamically switch between <img> and <video> based on your links -->
  <img id="scaryMedia" class="scary-media" alt="TERROR MANIFEST" style="display: none;">
  <video id="scaryVideo" class="scary-media" autoplay muted playsinline style="display: none;"></video>
</div>
<div class="red-flash" id="redFlash"></div>
<div class="creepy-footer">⚰️ the veil is thin ⚰️</div>

<script>
  (function() {
    // --------------------------------------------------------------
    // 🔻🔻🔻  EASY CUSTOMIZATION ZONE 🔻🔻🔻
    // REPLACE THESE LINKS WITH YOUR OWN GHOST PICTURES AND VIDEOS
    // --------------------------------------------------------------
    
    // Example ghost image URL (you can replace with any direct image link)
    const GHOST_IMAGE_URL = "https://cdn.pixabay.com/photo/2020/10/27/19/27/horror-5691482_1280.jpg";
    
    // Example ghost video URL (short scary video loop) - replace with your own video link.
    // Note: The video must be directly accessible (ends with .mp4, .webm, etc.) or a valid blob.
    const GHOST_VIDEO_URL = "https://cdn.pixabay.com/video/2023/10/18/185775-876080529_large.mp4";
    
    // 🧠 INSTRUCTION: 
    // If you have a specific image link from Google Play or any URL that ends with .jpg/.png/.gif, assign it to GHOST_IMAGE_URL.
    // If you have a video file link (ends with .mp4, .mov, .webm), assign it to GHOST_VIDEO_URL.
    // The page will randomly choose between image and video scare each time you click the button (for variety).
    // You can also set USE_ONLY_IMAGE = true to always show image, or USE_ONLY_VIDEO = true to always show video.
    
    const USE_ONLY_IMAGE = false;   // set to true to always show the ghost image
    const USE_ONLY_VIDEO = false;   // set to true to always show the ghost video
    
    // --------------------------------------------------------------
    // END OF CUSTOMIZATION ZONE — NO NEED TO EDIT BELOW
    // --------------------------------------------------------------
    
    // DOM elements
    const summonBtn = document.getElementById('summonButton');
    const jumpscareDiv = document.getElementById('jumpscareOverlay');
    const redFlashDiv = document.getElementById('redFlash');
    const scaryImg = document.getElementById('scaryMedia');
    const scaryVideo = document.getElementById('scaryVideo');
    const stageDiv = document.getElementById('horrorStage');
    
    // Audio setup: terrifying scream using Web Audio (guaranteed to work, no external files)
    let audioCtx = null;
    let screamBuffer = null;
    let audioAllowed = false;
    
    // Function to generate horrifying scream sound
    function createScreamBuffer() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      const sampleRate = audioCtx.sampleRate;
      const duration = 1.7;
      const frameCount = sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, frameCount, sampleRate);
      const channelData = buffer.getChannelData(0);
      
      for (let i = 0; i < frameCount; i++) {
        const t = i / sampleRate;
        let freq = 340 + t * 1000;
        if (freq > 1600) freq = 1600;
        let scream = Math.sin(2 * Math.PI * freq * t) * (1 - t/duration);
        let harmonic = Math.sin(2 * Math.PI * (freq * 2.1) * t) * 0.5;
        let growl = Math.sin(2 * Math.PI * 68 * t) * 0.8 * Math.exp(-t * 3.5);
        let glitch = (Math.random() - 0.5) * 0.55 * (t < 0.35 ? 0.9 : 0.2);
        let envelope = Math.min(1.0, t * 14) * (1 - t / duration * 0.75);
        let sample = (scream * 0.9 + harmonic * 0.7 + growl * 0.8 + glitch) * envelope;
        sample = Math.max(-0.98, Math.min(0.98, sample * 1.45));
        channelData[i] = sample;
      }
      return buffer;
    }
    
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (!screamBuffer) {
        screamBuffer = createScreamBuffer();
      }
    }
    
    function playScream() {
      if (!audioAllowed) return;
      if (!audioCtx || !screamBuffer) {
        initAudio();
        if (!screamBuffer) return;
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => playScreamNow()).catch(e => console.warn);
      } else {
        playScreamNow();
      }
    }
    
    function playScreamNow() {
      if (!audioCtx || !screamBuffer) return;
      try {
        const source = audioCtx.createBufferSource();
        source.buffer = screamBuffer;
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.92;
        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        source.start();
      } catch(e) { console.warn(e); }
    }
    
    function enableAudio() {
      if (audioAllowed) return;
      initAudio();
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => { audioAllowed = true; }).catch(() => {});
      } else {
        audioAllowed = true;
      }
    }
    
    // Enable audio on first user interaction (any click anywhere)
    window.addEventListener('click', function firstClickHandler() {
      enableAudio();
      window.removeEventListener('click', firstClickHandler);
    }, { once: true });
    window.addEventListener('touchstart', function firstTouchHandler() {
      enableAudio();
      window.removeEventListener('touchstart', firstTouchHandler);
    }, { once: true });
    
    // Helper: preload image and video resources to make jumpscare instant
    function preloadMedia() {
      const img = new Image();
      img.src = GHOST_IMAGE_URL;
      if (GHOST_VIDEO_URL) {
        const videoElem = document.createElement('video');
        videoElem.preload = 'auto';
        videoElem.src = GHOST_VIDEO_URL;
      }
    }
    preloadMedia();
    
    // State management
    let isScaring = false;
    let activeTimeouts = [];
    
    function clearTimeouts() {
      for (let id of activeTimeouts) clearTimeout(id);
      activeTimeouts = [];
    }
    
    // Stop video playback and reset
    function stopVideo() {
      scaryVideo.pause();
      scaryVideo.src = '';
      scaryVideo.load();
    }
    
    // Show jumpscare with either image or video based on settings
    function startJumpScare(useVideo) {
      // Reset media visibility
      scaryImg.style.display = 'none';
      scaryVideo.style.display = 'none';
      stopVideo();
      
      if (useVideo && GHOST_VIDEO_URL) {
        // Use video jumpscare
        scaryVideo.src = GHOST_VIDEO_URL;
        scaryVideo.load();
        scaryVideo.muted = false;  // unmute for full scare (but autoplay policy may require muted? We'll try with sound)
        // Note: browsers often block unmuted autoplay, but since user clicked the button and we have audio permission, it's allowed.
        // For safety we set muted = false and rely on user interaction.
        scaryVideo.muted = false;
        scaryVideo.style.display = 'block';
        // Play video with catch for any autoplay issues
        const playPromise = scaryVideo.play();
        if (playPromise !== undefined) {
          playPromise.catch(error => {
            console.warn("Video autoplay prevented, playing muted fallback:", error);
            scaryVideo.muted = true;
            scaryVideo.play();
          });
        }
      } else {
        // Use image jumpscare (fallback if video not available or forced)
        scaryImg.src = GHOST_IMAGE_URL;
        scaryImg.style.display = 'block';
      }
      
      // Show overlay and apply shake effect
      jumpscareDiv.style.visibility = 'visible';
      jumpscareDiv.style.opacity = '1';
      
      const mediaElement = useVideo ? scaryVideo : scaryImg;
      if (mediaElement) {
        mediaElement.style.animation = 'violentShake 0.1s infinite';
      }
    }
    
    // Main scare sequence
    function triggerJumpScare() {
      if (isScaring) return;
      isScaring = true;
      clearTimeouts();
      
      // Decide whether to show image or video based on user config and availability
      let useVideo = false;
      if (USE_ONLY_IMAGE) useVideo = false;
      else if (USE_ONLY_VIDEO) useVideo = true;
      else {
        // Random choice: 50% image, 50% video (if video URL exists)
        useVideo = (GHOST_VIDEO_URL && GHOST_VIDEO_URL.length > 0) ? (Math.random() < 0.5) : false;
      }
      
      // If video but no valid video url, fallback to image
      if (useVideo && (!GHOST_VIDEO_URL || GHOST_VIDEO_URL === "")) {
        useVideo = false;
      }
      
      // enable & play scream sound
      if (!audioAllowed) {
        enableAudio();
        setTimeout(() => playScream(), 10);
      } else {
        playScream();
      }
      
      // Red flash pre-scare (intense)
      redFlashDiv.style.opacity = '0.95';
      setTimeout(() => { redFlashDiv.style.opacity = '0'; }, 70);
      
      // Slight delay to build tension
      setTimeout(() => {
        startJumpScare(useVideo);
        
        // Additional red flash during scare
        redFlashDiv.style.opacity = '1';
        setTimeout(() => { redFlashDiv.style.opacity = '0'; }, 140);
        
        // Vibration for mobile horror
        if (navigator.vibrate) navigator.vibrate([200, 100, 250]);
        
        // Disable background button
        stageDiv.classList.add('disable-interaction');
        summonBtn.disabled = true;
        document.body.style.overflow = 'hidden';
        
        // Keep jumpscare active for 1.4 seconds then fade out
        activeTimeouts.push(setTimeout(() => {
          jumpscareDiv.style.transition = 'opacity 0.2s ease-out, visibility 0s linear 0.25s';
          jumpscareDiv.style.opacity = '0';
          
          setTimeout(() => {
            jumpscareDiv.style.visibility = 'hidden';
            jumpscareDiv.style.transition = '';
            // Stop video and reset media
            stopVideo();
            scaryImg.style.display = 'none';
            scaryVideo.style.display = 'none';
            if (scaryImg) scaryImg.style.animation = '';
            if (scaryVideo) scaryVideo.style.animation = '';
            
            stageDiv.classList.remove('disable-interaction');
            summonBtn.disabled = false;
            document.body.style.overflow = '';
            isScaring = false;
            
            // After scare: change button text briefly to mess with user
            const originalText = summonBtn.innerHTML;
            summonBtn.innerHTML = "👁️ IT SAW YOU 👁️";
            setTimeout(() => {
              if (summonBtn && !isScaring) summonBtn.innerHTML = originalText;
            }, 1500);
          }, 250);
        }, 1400));
      }, 80);
    }
    
    // Attach click event to button
    summonBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (isScaring) return;
      triggerJumpScare();
    });
    
    // Optional: small flicker ambiance on body to keep tension
    let ambianceInterval = setInterval(() => {
      if (!isScaring && Math.random() < 0.12) {
        const flicker = document.createElement('div');
        flicker.style.position = 'fixed';
        flicker.style.top = 0;
        flicker.style.left = 0;
        flicker.style.width = '100%';
        flicker.style.height = '100%';
        flicker.style.backgroundColor = 'rgba(90, 0, 0, 0.15)';
        flicker.style.pointerEvents = 'none';
        flicker.style.zIndex = 50;
        document.body.appendChild(flicker);
        setTimeout(() => flicker.remove(), 55);
      }
    }, 4000);
    
    // Clean intervals on page unload
    window.addEventListener('beforeunload', () => {
      clearInterval(ambianceInterval);
      clearTimeouts();
      if (scaryVideo) stopVideo();
    });
    
    // Prevent right-click from ruining experience (optional)
    document.addEventListener('contextmenu', (e) => {
      if (!isScaring) e.preventDefault();
      return false;
    });
    
    console.log("Horror page ready — button in center will trigger jumpscare with YOUR ghost media (replace links in code).");
  })();
</script>
</body>
</html>
